<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>英雄聯盟抽籤</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-base: #f3f4f6;
      --card-bg: #ffffff;
      --border-color: #e5e7eb;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent: #8b5cf6;
      --danger: #ef4444;
      --success: #10b981;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --input-bg: #ffffff;
    }

    [data-theme="dark"] {
      --bg-base: #111827;
      --card-bg: #1f2937;
      --border-color: #374151;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --accent: #8b5cf6;
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      --input-bg: #1f2937;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      margin: 0;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      width: 100%;
      max-width: 1280px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      position: relative;
    }

    .theme-toggle {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: var(--shadow-md);
    }

    .page-title {
      text-align: center;
      margin-bottom: -10px;
      margin-top: 20px;
    }
    
    .page-title h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 8px 0;
      color: var(--text-main);
      letter-spacing: 1px;
    }

    .control-panel {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 8px;
      box-shadow: var(--shadow-md);
      transition: all 0.3s;
      justify-content: center;
    }

    body.is-drawn .input-group {
      width: auto;
    }

    body.is-drawn .btn {
      padding: 16px 36px;
      font-size: 18px;
    }

    body.is-drawn #main-input,
    body.is-drawn #btn-add,
    body.is-drawn #known-hints {
      display: none !important;
    }

    #main-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 16px 24px;
      font-size: 18px;
      color: var(--text-main);
      outline: none;
      font-weight: 500;
    }

    #main-input::placeholder {
      color: var(--text-muted);
    }

    #main-input:disabled {
      opacity: 0.4;
    }

    .btn {
      padding: 16px 28px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .btn-primary:disabled {
      background: var(--border-color);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: var(--border-color);
    }

    .known-hints {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 0 20px;
    }

    .known-chip {
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .known-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-1px);
    }

    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: stretch;
      gap: 20px;
      width: 100%;
    }

    .player-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 24px;
      width: 220px;
      flex: 1 1 200px;
      max-width: 260px;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: var(--shadow-md);
      transition: all 0.3s;
      animation: slideUp 0.3s ease-out backwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .player-card.is-drawing {
      transform: scale(0.95);
      opacity: 0.8;
    }

    .btn-remove {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg-base);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .btn-remove:hover {
      background: var(--danger);
      color: white;
      border-color: var(--danger);
    }

    .card-header {
      margin-top: 8px;
      text-align: center;
    }

    .card-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      word-break: break-word;
      line-height: 1.3;
      color: var(--text-main);
    }

    .card-result {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
      display: none;
      flex-direction: row;
      justify-content: space-evenly;
      align-items: center;
      width: 100%;
      animation: fadeIn 0.4s ease-out;
    }

    .player-card.has-result .card-result {
      display: flex;
    }

    .player-card.has-result {
      box-shadow: var(--shadow-lg);
    }

    .role-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .role-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .main-role-col .role-icon-img {
      width: 64px;
      height: 64px;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
      transition: transform 0.4s;
      object-fit: contain;
    }

    .main-role-col .role-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-main);
    }

    .sub-role-col {
      opacity: 0.85;
      transform: scale(0.9);
    }

    .sub-role-col .role-icon-img {
      width: 48px;
      height: 48px;
      margin-bottom: 8px;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.15));
      object-fit: contain;
    }

    .sub-role-col .role-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .player-card:hover .role-icon-img {
      transform: scale(1.1) translateY(-4px);
    }

    .role-divider {
      width: 1px;
      height: 64px;
      background: var(--border-color);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fab-stats {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 100;
      transition: 0.3s;
      color: var(--text-main);
      box-shadow: var(--shadow-lg);
    }

    .fab-stats:hover {
      transform: scale(1.1);
      border-color: var(--primary);
      color: var(--primary);
    }

    .stats-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
      z-index: 200;
    }

    .stats-modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .stats-content {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      color: var(--text-main);
      background-clip: padding-box;
    }

    .stats-scroll {
      max-height: calc(80vh - 112px);
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 8px;
      margin-right: -8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.45) transparent;
    }

    .stats-scroll::-webkit-scrollbar {
      width: 12px;
    }

    .stats-scroll::-webkit-scrollbar-track {
      background: transparent;
      margin: 14px 0;
    }

    .stats-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.35);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    .stats-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.52);
      background-clip: content-box;
    }

    .stats-scroll::-webkit-scrollbar-button {
      display: none;
      width: 0;
      height: 0;
    }

    .stats-scroll::-webkit-scrollbar-corner {
      background: transparent;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
    }

    th { color: var(--text-muted); font-weight: 600; }

    #toast-wrap {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: var(--text-main);
      padding: 14px 20px;
      border-radius: 12px;
      color: var(--bg-base);
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.3s;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      .input-group { flex-direction: column; padding: 16px; border-radius: 20px; }
      .btn { padding: 14px; border-radius: 12px; }
      #main-input { padding: 12px 16px; }
      .player-card { width: 100%; max-width: 100%; flex-direction: row; align-items: center; padding: 16px; }
      .btn-remove { top: 50%; transform: translateY(-50%); right: 16px; }
      .card-header { margin-top: 0; text-align: left; margin-right: auto; }
      .card-result {
        margin-top: 0; padding-top: 0; border-top: none;
        padding-left: 16px; border-left: 1px solid var(--border-color);
        flex-direction: row; justify-content: flex-start; gap: 20px; margin-right: 40px;
      }
      .role-label { font-size: 10px; margin-bottom: 4px; }
      .main-role-col .role-icon-img { width: 48px; height: 48px; margin-bottom: 4px; }
      .main-role-col .role-name { font-size: 16px; }
      .sub-role-col .role-icon-img { width: 36px; height: 36px; margin-bottom: 4px; }
      .sub-role-col .role-name { font-size: 14px; }
      .role-divider { height: 40px; margin-top: 12px; }
    }
  </style>
</head>

<body>

  <div class="container">
    <button id="theme-toggle" class="theme-toggle" title="切換深淺色模式">
      <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
    <div class="page-title">
      <h1>英雄聯盟抽籤</h1>
    </div>

    <div class="control-panel">
      <div class="input-group">
        <input type="text" id="main-input" placeholder="輸入玩家名稱 (按 Enter 加入)..." autocomplete="off" />
        <button class="btn btn-primary" id="btn-add">加入玩家</button>
        <button class="btn btn-secondary" id="btn-edit" style="display: none;">修改名單</button>
        <button class="btn btn-primary" id="btn-draw" disabled>開始抽籤</button>
        <button class="btn btn-secondary" id="btn-copy" style="display: none;">複製結果</button>
      </div>

      <div id="known-hints" class="known-hints"></div>
    </div>

    <div class="cards-grid" id="cards-grid">
      <!-- Cards injected here -->
    </div>
  </div>

  <button class="fab-stats" id="fab-stats" title="歷史統計">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"></line>
      <line x1="12" y1="20" x2="12" y2="4"></line>
      <line x1="6" y1="20" x2="6" y2="14"></line>
    </svg>
  </button>

  <div class="stats-modal" id="stats-modal">
    <div class="stats-content">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">歷史數據</h2>
        <button id="stats-close"
          style="background:none; border:none; color:var(--text-muted); font-size:24px; cursor:pointer; transition:0.2s;">×</button>
      </div>
      <div class="stats-scroll">
        <table>
          <thead>
            <tr>
              <th>玩家</th>
              <th>上路</th>
              <th>打野</th>
              <th>中路</th>
              <th>下路</th>
              <th>輔助</th>
            </tr>
          </thead>
          <tbody id="stats-tbody"></tbody>
        </table>
        <div style="text-align:right; margin-top:24px;">
          <button id="btn-clear-stats" class="btn btn-secondary" style="color:var(--danger);">清空紀錄</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-wrap"></div>

  <script>
    const positions = ["上路", "打野", "中路", "下路", "輔助"];
    const posImgUrls = {
      "上路": "https://wiki.leagueoflegends.com/en-us/images/Top_icon.png",
      "打野": "https://wiki.leagueoflegends.com/en-us/images/Jungle_icon.png",
      "中路": "https://wiki.leagueoflegends.com/en-us/images/Middle_icon.png",
      "下路": "https://wiki.leagueoflegends.com/en-us/images/Bottom_icon.png",
      "輔助": "https://wiki.leagueoflegends.com/en-us/images/Support_icon.png"
    };
    let selectedPlayers = [];
    let drawResults = {}; // { playerName: { main, secondary } }
    let hasDrawn = false;

    const STORAGE_STATS = "lolDrawStats";

    // Theme Toggle Logic
    const themeToggle = document.getElementById('theme-toggle');
    const iconMoon = document.getElementById('icon-moon');
    const iconSun = document.getElementById('icon-sun');
    
    // Check saved theme or system preference
    const THEME_KEY = 'lolTheme';
    const LEGACY_THEME_KEY = 'lol-theme';
    const savedTheme = localStorage.getItem(THEME_KEY) || localStorage.getItem(LEGACY_THEME_KEY);
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    let currentTheme = savedTheme || (prefersDark ? 'dark' : 'light');
    
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') {
        iconMoon.style.display = 'none';
        iconSun.style.display = 'block';
      } else {
        iconMoon.style.display = 'block';
        iconSun.style.display = 'none';
      }
      localStorage.setItem(THEME_KEY, theme);
      localStorage.removeItem(LEGACY_THEME_KEY);
    }
    
    applyTheme(currentTheme);
    
    themeToggle.addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      applyTheme(currentTheme);
    });

    const inputEl = document.getElementById('main-input');
    const btnAdd = document.getElementById('btn-add');
    const btnDraw = document.getElementById('btn-draw');
    const btnCopy = document.getElementById('btn-copy');
    const btnEdit = document.getElementById('btn-edit');
    const knownHints = document.getElementById('known-hints');
    const cardsGrid = document.getElementById('cards-grid');
    const fabStats = document.getElementById('fab-stats');
    const statsClose = document.getElementById('stats-close');
    const btnClearStats = document.getElementById('btn-clear-stats');
    const statsTbody = document.getElementById('stats-tbody');

    function toast(msg) {
      const wrap = document.getElementById('toast-wrap');
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    function getStats() { return JSON.parse(localStorage.getItem(STORAGE_STATS) || '{}'); }
    function saveStats(s) { localStorage.setItem(STORAGE_STATS, JSON.stringify(s)); }
    function sortPlayerNames(stats) {
      return Object.keys(stats).sort((a, b) => {
        const totalA = positions.reduce((sum, position) => sum + (stats[a]?.[position] || 0), 0);
        const totalB = positions.reduce((sum, position) => sum + (stats[b]?.[position] || 0), 0);
        if (totalA !== totalB) return totalB - totalA;
        return a.localeCompare(b, 'zh-Hant');
      });
    }

    function renderKnownPlayers() {
      const stats = getStats();
      const names = sortPlayerNames(stats);
      knownHints.replaceChildren();
      if (names.length === 0) {
        const empty = document.createElement('span');
        empty.style.color = 'var(--text-muted)';
        empty.style.fontSize = '13px';
        empty.textContent = '尚未累積歷史玩家';
        knownHints.appendChild(empty);
        return;
      }
      names.forEach(n => {
        if (selectedPlayers.includes(n)) return;
        const chip = document.createElement('span');
        chip.className = 'known-chip';
        chip.textContent = n;
        chip.addEventListener('click', () => {
          inputEl.value = n;
          addPlayer();
        });
        knownHints.appendChild(chip);
      });
    }

    function updateUI() {
      inputEl.placeholder = '輸入玩家名稱... (目前 ' + selectedPlayers.length + '/5)';

      if (selectedPlayers.length >= 5) {
        inputEl.disabled = true;
      } else {
        inputEl.disabled = false;
      }

      btnDraw.disabled = selectedPlayers.length === 0;

      if (hasDrawn) {
        btnEdit.style.display = 'inline-flex';
        btnDraw.textContent = '重新抽籤';
        btnCopy.style.display = 'inline-flex';
        document.body.classList.add('is-drawn');
      } else {
        btnEdit.style.display = 'none';
        btnDraw.textContent = '開始抽籤';
        btnCopy.style.display = 'none';
        document.body.classList.remove('is-drawn');
      }

      renderCards();
      renderKnownPlayers();
    }

    function renderCards() {
      cardsGrid.replaceChildren();
      selectedPlayers.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'player-card';
        card.style.animationDelay = (idx * 0.05) + 's';

        const res = drawResults[p];
        if (res) {
          card.classList.add('has-result');
        }

        if (!hasDrawn) {
          const removeButton = document.createElement('button');
          removeButton.className = 'btn-remove';
          removeButton.type = 'button';
          removeButton.title = '移除玩家';
          removeButton.textContent = '×';
          removeButton.addEventListener('click', () => removePlayer(p));
          card.appendChild(removeButton);
        }

        const cardHeader = document.createElement('div');
        cardHeader.className = 'card-header';
        const cardName = document.createElement('div');
        cardName.className = 'card-name';
        cardName.textContent = p;
        cardHeader.appendChild(cardName);
        card.appendChild(cardHeader);

        if (res) {
          const result = document.createElement('div');
          result.className = 'card-result';
          result.appendChild(createRoleColumn('main-role-col', res.main, res.secondary ? '主要' : ''));

          if (res.secondary) {
            const divider = document.createElement('div');
            divider.className = 'role-divider';
            result.appendChild(divider);
            result.appendChild(createRoleColumn('sub-role-col', res.secondary, '次要'));
          }

          card.appendChild(result);
        }

        cardsGrid.appendChild(card);
      });
    }

    function createRoleColumn(extraClass, role, label) {
      const col = document.createElement('div');
      col.className = 'role-col ' + extraClass;

      if (label) {
        const roleLabel = document.createElement('span');
        roleLabel.className = 'role-label';
        roleLabel.textContent = label;
        col.appendChild(roleLabel);
      }

      const img = document.createElement('img');
      img.src = posImgUrls[role];
      img.alt = role;
      img.className = 'role-icon-img';
      img.addEventListener('error', () => {
        img.style.display = 'none';
      }, { once: true });
      col.appendChild(img);

      const roleName = document.createElement('div');
      roleName.className = 'role-name';
      roleName.textContent = role;
      col.appendChild(roleName);

      return col;
    }

    function addPlayer() {
      const val = inputEl.value.trim();
      if (!val) return;
      if (selectedPlayers.includes(val)) return toast('玩家已存在');
      if (selectedPlayers.length >= 5) return toast('已達 5 人上限');

      const s = getStats();
      if (!s[val]) { s[val] = { "上路": 0, "打野": 0, "中路": 0, "下路": 0, "輔助": 0 }; saveStats(s); }

      selectedPlayers.push(val);
      inputEl.value = '';

      hasDrawn = false;
      drawResults = {};

      updateUI();
    }

    function removePlayer(name) {
      selectedPlayers = selectedPlayers.filter(x => x !== name);
      hasDrawn = false;
      drawResults = {};
      updateUI();
    }

    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
    btnAdd.addEventListener('click', addPlayer);

    btnEdit.addEventListener('click', () => {
      hasDrawn = false;
      drawResults = {};
      updateUI();
      // focus input automatically after returning to edit mode
      setTimeout(() => inputEl.focus(), 50);
    });

    function cryptoRandom(max) {
      const array = new Uint32Array(1);
      crypto.getRandomValues(array);
      return array[0] % max;
    }

    btnDraw.addEventListener('click', () => {
      if (selectedPlayers.length === 0) return;

      // Visual effect: shrink cards briefly
      document.querySelectorAll('.player-card').forEach(el => el.classList.add('is-drawing'));

      setTimeout(() => {
        processDraw();
      }, 200);
    });

    function processDraw() {
      const names = [...selectedPlayers];
      const pos = [...positions];

      if (names.length > positions.length) {
        toast('玩家數量超過位置數量');
        return;
      }

      // Shuffle positions
      for (let i = pos.length - 1; i > 0; i--) {
        const j = cryptoRandom(i + 1);
        const temp = pos[i];
        pos[i] = pos[j];
        pos[j] = temp;
      }

      const tempRes = [];
      for (let i = 0; i < names.length; i++) {
        tempRes.push({ name: names[i], main: pos[i], secondary: '' });
      }

      // Assign secondary
      if (names.length < 5) {
        let attempts = 0;
        let assigned = false;
        while (attempts < 1000) {
          attempts++;
          tempRes.forEach(r => {
            const p = positions.filter(x => x !== r.main);
            r.secondary = p[cryptoRandom(p.length)];
          });
          const covered = new Set(tempRes.flatMap(r => [r.main, r.secondary]));
          if (covered.size >= tempRes.length + 1) {
            assigned = true;
            break;
          }
        }
        if (!assigned) {
          toast('無法生成符合條件的結果，請重試');
          updateUI();
          return;
        }
      }

      // Save to map
      drawResults = {};
      tempRes.forEach(r => { drawResults[r.name] = r; });

      // Stats update
      const s = getStats();
      tempRes.forEach(x => {
        s[x.name][x.main] += 1;
        if (x.secondary) s[x.name][x.secondary] += 0.5;
      });
      saveStats(s);
      renderStats();

      hasDrawn = true;
      updateUI();
      toast('🎲 抽籤完成！');
    }

    btnCopy.addEventListener('click', () => {
      if (!hasDrawn) return;
      let text = '';
      selectedPlayers.forEach(player => {
        if (drawResults[player]) {
          if (drawResults[player].secondary) {
            text += player + '：主要 ' + drawResults[player].main + '｜次要 ' + drawResults[player].secondary + '\n';
          } else {
            text += player + '：' + drawResults[player].main + '\n';
          }
        }
      });
      navigator.clipboard.writeText(text.trim())
        .then(() => toast('抽籤結果已複製！'))
        .catch(() => toast('無法複製到剪貼簿'));
    });

    // --- 快捷鍵設定 ---
    document.addEventListener('keydown', (e) => {
      const isInputActive = document.activeElement === inputEl;
      const isModalOpen = modal.classList.contains('open');

      if (e.key === 'Escape' && isModalOpen) {
        modal.classList.remove('open');
        return;
      }

      // Enter: 抽籤 / 重新抽籤
      if (e.key === 'Enter' && !isModalOpen) {
        // 如果輸入框內有文字且正在焦點上，讓加入玩家的事件優先處理
        if (isInputActive && inputEl.value.trim() !== '') {
          return;
        }
        e.preventDefault(); // 避免多次觸發
        if (!btnDraw.disabled) {
          btnDraw.click();
        }
      }

      // C: 複製抽籤結果 (非輸入狀態)
      if (e.key.toLowerCase() === 'c' && !isInputActive && !isModalOpen) {
        e.preventDefault();
        if (btnCopy.style.display !== 'none' && !btnCopy.disabled) {
          btnCopy.click();
        }
      }
    });

    // Stats Modal
    const modal = document.getElementById('stats-modal');
    fabStats.addEventListener('click', () => {
      renderStats();
      modal.classList.add('open');
    });
    statsClose.addEventListener('click', () => modal.classList.remove('open'));
    statsClose.addEventListener('mouseenter', () => {
      statsClose.style.color = 'white';
    });
    statsClose.addEventListener('mouseleave', () => {
      statsClose.style.color = 'var(--text-muted)';
    });
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('open');
    });
    btnClearStats.addEventListener('click', () => {
      if (confirm('清空紀錄？')) {
        localStorage.removeItem(STORAGE_STATS);
        renderStats();
        renderKnownPlayers();
      }
    });

    function renderStats() {
      const stats = getStats();
      statsTbody.replaceChildren();
      sortPlayerNames(stats).forEach(n => {
        const tr = document.createElement('tr');
        const values = [n, stats[n]['上路'], stats[n]['打野'], stats[n]['中路'], stats[n]['下路'], stats[n]['輔助']];
        values.forEach(value => {
          const td = document.createElement('td');
          td.textContent = String(value);
          tr.appendChild(td);
        });
        statsTbody.appendChild(tr);
      });
    }

    // Init
    updateUI();
    renderStats();
  </script>
</body>

</html>
