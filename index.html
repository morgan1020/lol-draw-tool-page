<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>英雄聯盟抽籤</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-base: #f6f7fb;
      --surface: #ffffff;
      --surface-muted: #f3f6fb;
      --border-color: #d8e0ec;
      --border-strong: #9ca8ba;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-text: #ffffff;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --selected: #2563eb;
      --selected-bg: rgba(37, 99, 235, 0.1);
      --danger: #b42318;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 18px 40px -28px rgba(15, 23, 42, 0.35);
      --input-bg: #ffffff;
      --card-bg: var(--surface);
    }

    [data-theme="dark"] {
      --bg-base: #0b0f1a;
      --surface: #121826;
      --surface-muted: #1c2534;
      --border-color: rgba(148, 163, 184, 0.2);
      --border-strong: rgba(148, 163, 184, 0.38);
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #5b8cff;
      --primary-hover: #4f7df0;
      --primary-text: #ffffff;
      --accent: #5b8cff;
      --accent-soft: rgba(91, 140, 255, 0.18);
      --selected: #5b8cff;
      --selected-bg: rgba(91, 140, 255, 0.16);
      --danger: #f97066;
      --shadow-sm: none;
      --shadow-md: 0 18px 40px rgba(0, 0, 0, 0.36);
      --input-bg: #121820;
      --card-bg: var(--surface);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif;
      background: var(--bg-base);
      color: var(--text-main);
      margin: 0;
      min-height: 100vh;
      padding: 28px;
      transition: background-color 0.2s, color 0.2s;
    }

    button,
    input {
      font: inherit;
    }

    .container {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 18px;
    }

    .page-title {
      margin: 0;
    }

    .page-title h1 {
      color: var(--text-main);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.2;
      margin: 0;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-btn,
    .theme-toggle,
    .fab-stats {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--surface);
      color: var(--text-main);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
      box-shadow: none;
    }

    .icon-btn:hover,
    .theme-toggle:hover,
    .fab-stats:hover {
      background: var(--surface-muted);
      border-color: var(--border-strong);
      color: var(--text-main);
    }

    .control-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 18px;
      box-shadow: var(--shadow-sm);
    }

    .input-group {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto auto auto;
      gap: 8px;
      width: 100%;
      align-items: center;
      transition: opacity 0.2s;
    }

    body.is-drawn .input-group {
      display: flex;
      justify-content: center;
    }

    body.is-drawn #main-input,
    body.is-drawn #btn-add,
    body.is-drawn #known-hints {
      display: none !important;
    }

    #main-input {
      width: 100%;
      min-width: 0;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 16px;
      font-weight: 400;
      outline: none;
      padding: 12px 14px;
      transition: border-color 0.15s, background-color 0.15s;
    }

    #main-input:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    #main-input::placeholder {
      color: var(--text-muted);
    }

    #main-input:disabled {
      opacity: 0.5;
    }

    .btn {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--primary-text);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
      box-shadow: 0 10px 20px -14px var(--primary);
    }

    .btn-primary:disabled {
      background: var(--surface-muted);
      border-color: var(--border-color);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--surface);
      border-color: var(--border-color);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: var(--surface-muted);
      border-color: var(--border-strong);
    }

    .known-hints {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .known-chip {
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 500;
      background: var(--surface-muted);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
      box-shadow: none;
    }

    .known-chip:hover {
      background: var(--selected-bg);
      border-color: var(--border-strong);
      color: var(--text-main);
    }

    .known-chip.is-selected {
      background: var(--selected-bg);
      border-color: var(--selected);
      color: var(--text-main);
      box-shadow: inset 0 0 0 1px var(--accent-soft);
    }

    .known-chip.is-selected:hover {
      background: var(--selected-bg);
      border-color: var(--selected);
      color: var(--text-main);
    }

    .players-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      width: 100%;
    }

    .player-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 18px;
      min-height: 132px;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: border-color 0.15s, background-color 0.15s;
      animation: slideUp 0.18s ease-out backwards;
    }

    .player-card:hover {
      border-color: var(--accent);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .player-card.is-drawing {
      background: var(--surface-muted);
      opacity: 0.72;
    }

    .btn-remove {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-remove:hover {
      background: var(--surface-muted);
      border-color: var(--border-color);
      color: var(--danger);
    }

    .card-header {
      margin: 0;
      padding: 0 32px;
      text-align: center;
    }

    .card-name {
      color: var(--text-main);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .preferred-role-control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 14px;
      position: relative;
    }

    .preferred-role-control::after {
      content: "";
      position: absolute;
      right: 14px;
      bottom: 15px;
      width: 7px;
      height: 7px;
      border-right: 1.5px solid var(--text-muted);
      border-bottom: 1.5px solid var(--text-muted);
      pointer-events: none;
      transform: rotate(45deg);
      transition: border-color 0.15s;
    }

    .preferred-role-control:focus-within::after {
      border-color: var(--accent);
    }

    .preferred-role-label {
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
    }

    .preferred-role-select {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text-main);
      font-size: 14px;
      line-height: 38px;
      padding: 0 34px 0 12px;
      outline: none;
      transition: border-color 0.15s, background-color 0.15s;
    }

    .preferred-role-select:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .card-result {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
      display: none;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      animation: fadeIn 0.2s ease-out;
    }

    .player-card.has-result .card-result {
      display: flex;
    }

    .player-card.has-result {
      border-color: var(--border-strong);
    }

    .role-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .role-label {
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0;
      margin-bottom: 6px;
    }

    .main-role-col .role-icon-img,
    .sub-role-col .role-icon-img {
      filter: saturate(1.18) contrast(1.06);
      object-fit: contain;
      transition: filter 0.15s;
    }

    .main-role-col .role-icon-img {
      width: 54px;
      height: 54px;
      margin-bottom: 7px;
    }

    .main-role-col .role-name {
      color: var(--text-main);
      font-size: 18px;
      font-weight: 700;
    }

    .sub-role-col {
      opacity: 0.94;
    }

    .sub-role-col .role-icon-img {
      width: 42px;
      height: 42px;
      margin-bottom: 7px;
    }

    .sub-role-col .role-name {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 600;
    }

    .role-divider {
      width: 1px;
      height: 58px;
      background: var(--border-color);
      margin: 0 12px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stats-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.42);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      padding: 20px;
      transition: opacity 0.16s;
      z-index: 200;
    }

    .stats-modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .stats-content {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      box-shadow: var(--shadow-md);
      color: var(--text-main);
      max-height: 80vh;
      max-width: 640px;
      overflow: hidden;
      padding: 0;
      width: 100%;
    }

    .stats-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding: 18px 20px;
    }

    .stats-header h2 {
      font-size: 20px;
      line-height: 1.2;
      margin: 0;
    }

    .stats-close {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
    }

    .stats-close:hover {
      background: var(--surface-muted);
      border-color: var(--border-color);
      color: var(--text-main);
    }

    .stats-scroll {
      max-height: calc(80vh - 70px);
      overflow-y: auto;
      overflow-x: auto;
      padding: 4px 20px 20px;
      scrollbar-color: var(--border-strong) transparent;
      scrollbar-width: thin;
    }

    .stats-scroll::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .stats-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .stats-scroll::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      min-width: 520px;
    }

    th, td {
      padding: 12px 10px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
    }

    .stats-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .btn-danger-text {
      color: var(--danger);
    }

    #toast-wrap {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      background: var(--text-main);
      border: 1px solid var(--text-main);
      border-radius: 8px;
      color: var(--bg-base);
      font-weight: 500;
      padding: 12px 14px;
      box-shadow: var(--shadow-md);
      animation: slideUp 0.18s;
    }

    @media (max-width: 768px) {
      body {
        padding: 18px;
      }

      .container {
        gap: 18px;
      }

      .app-header {
        align-items: flex-start;
      }

      .page-title h1 {
        font-size: 24px;
      }

      .control-panel {
        padding: 14px;
      }

      .input-group,
      body.is-drawn .input-group {
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        width: 100%;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }

      .player-card {
        min-height: auto;
        padding: 16px;
      }

      .card-result {
        gap: 10px;
      }

      .main-role-col .role-icon-img {
        width: 46px;
        height: 46px;
      }

      .main-role-col .role-name {
        font-size: 16px;
      }

      .sub-role-col .role-icon-img {
        width: 36px;
        height: 36px;
      }

      .sub-role-col .role-name {
        font-size: 14px;
      }

      #toast-wrap {
        left: 18px;
        right: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <header class="app-header">
      <div class="page-title">
        <h1>英雄聯盟抽籤</h1>
      </div>

      <div class="header-actions">
        <button class="fab-stats" id="fab-stats" title="歷史統計">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
        </button>
        <button id="theme-toggle" class="theme-toggle" title="切換深淺色模式">
          <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg id="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </header>

    <div class="control-panel">
      <div class="input-group">
        <input type="text" id="main-input" placeholder="輸入玩家名稱 (按 Enter 加入)..." autocomplete="off" />
        <button class="btn btn-primary" id="btn-add">加入玩家</button>
        <button class="btn btn-secondary" id="btn-edit" style="display: none;">修改名單</button>
        <button class="btn btn-primary" id="btn-draw" disabled>開始抽籤</button>
        <button class="btn btn-secondary" id="btn-copy" style="display: none;">複製結果</button>
      </div>

      <div id="known-hints" class="known-hints"></div>
    </div>

    <section class="players-panel">
      <div class="cards-grid" id="cards-grid">
        <!-- Cards injected here -->
      </div>
    </section>
  </div>

  <div class="stats-modal" id="stats-modal">
    <div class="stats-content">
      <div class="stats-header">
        <h2>歷史數據</h2>
        <button id="stats-close" class="stats-close">×</button>
      </div>
      <div class="stats-scroll">
        <table>
          <thead>
            <tr>
              <th>玩家</th>
              <th>上路</th>
              <th>打野</th>
              <th>中路</th>
              <th>下路</th>
              <th>輔助</th>
            </tr>
          </thead>
          <tbody id="stats-tbody"></tbody>
        </table>
        <div class="stats-actions">
          <button id="btn-clear-stats" class="btn btn-secondary btn-danger-text">清空紀錄</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-wrap"></div>

  <script>
    const positions = ["上路", "打野", "中路", "下路", "輔助"];
    const posImgUrls = {
      "上路": "assets/roles/Top_icon.png",
      "打野": "assets/roles/Jungle_icon.png",
      "中路": "assets/roles/Middle_icon.png",
      "下路": "assets/roles/Bottom_icon.png",
      "輔助": "assets/roles/Support_icon.png"
    };
    let selectedPlayers = [];
    let drawResults = {}; // { playerName: { main, secondary } }
    let preferredRoles = {}; // { playerName: position }
    let hasDrawn = false;

    const STORAGE_STATS = "lolDrawStats";

    // Theme Toggle Logic
    const themeToggle = document.getElementById('theme-toggle');
    const iconMoon = document.getElementById('icon-moon');
    const iconSun = document.getElementById('icon-sun');
    
    // Check saved theme or system preference
    const THEME_KEY = 'lolTheme';
    const LEGACY_THEME_KEY = 'lol-theme';
    const savedTheme = localStorage.getItem(THEME_KEY) || localStorage.getItem(LEGACY_THEME_KEY);
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    let currentTheme = savedTheme || (prefersDark ? 'dark' : 'light');
    
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'dark') {
        iconMoon.style.display = 'none';
        iconSun.style.display = 'block';
      } else {
        iconMoon.style.display = 'block';
        iconSun.style.display = 'none';
      }
      localStorage.setItem(THEME_KEY, theme);
      localStorage.removeItem(LEGACY_THEME_KEY);
    }
    
    applyTheme(currentTheme);
    
    themeToggle.addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      applyTheme(currentTheme);
    });

    const inputEl = document.getElementById('main-input');
    const btnAdd = document.getElementById('btn-add');
    const btnDraw = document.getElementById('btn-draw');
    const btnCopy = document.getElementById('btn-copy');
    const btnEdit = document.getElementById('btn-edit');
    const knownHints = document.getElementById('known-hints');
    const cardsGrid = document.getElementById('cards-grid');
    const fabStats = document.getElementById('fab-stats');
    const statsClose = document.getElementById('stats-close');
    const btnClearStats = document.getElementById('btn-clear-stats');
    const statsTbody = document.getElementById('stats-tbody');

    function toast(msg) {
      const wrap = document.getElementById('toast-wrap');
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    function getStats() { return JSON.parse(localStorage.getItem(STORAGE_STATS) || '{}'); }
    function saveStats(s) { localStorage.setItem(STORAGE_STATS, JSON.stringify(s)); }
    function sortPlayerNames(stats) {
      return Object.keys(stats).sort((a, b) => {
        const totalA = positions.reduce((sum, position) => sum + (stats[a]?.[position] || 0), 0);
        const totalB = positions.reduce((sum, position) => sum + (stats[b]?.[position] || 0), 0);
        if (totalA !== totalB) return totalB - totalA;
        return a.localeCompare(b, 'zh-Hant');
      });
    }

    function renderKnownPlayers() {
      const stats = getStats();
      const knownNames = sortPlayerNames(stats);
      const selectedKnown = selectedPlayers.filter(n => knownNames.includes(n));
      const selectedCustom = selectedPlayers.filter(n => !knownNames.includes(n));
      const unselected = knownNames.filter(n => !selectedPlayers.includes(n));
      const names = [...selectedKnown, ...selectedCustom, ...unselected];
      knownHints.replaceChildren();
      if (names.length === 0) {
        const empty = document.createElement('span');
        empty.style.color = 'var(--text-muted)';
        empty.style.fontSize = '13px';
        empty.textContent = '尚未累積歷史玩家';
        knownHints.appendChild(empty);
        return;
      }
      names.forEach(n => {
        const isSelected = selectedPlayers.includes(n);
        const chip = document.createElement('span');
        chip.className = isSelected ? 'known-chip is-selected' : 'known-chip';
        chip.textContent = n;
        chip.title = isSelected ? '點擊取消選取' : '點擊加入名單';
        chip.addEventListener('click', () => {
          if (isSelected) {
            removePlayer(n);
            return;
          }
          addPlayerName(n);
        });
        knownHints.appendChild(chip);
      });
    }

    function updateUI() {
      inputEl.placeholder = '輸入玩家名稱... (目前 ' + selectedPlayers.length + '/5)';

      if (selectedPlayers.length >= 5) {
        inputEl.disabled = true;
      } else {
        inputEl.disabled = false;
      }

      btnDraw.disabled = selectedPlayers.length === 0;

      if (hasDrawn) {
        btnEdit.style.display = 'inline-flex';
        btnDraw.textContent = '重新抽籤';
        btnCopy.style.display = 'inline-flex';
        document.body.classList.add('is-drawn');
      } else {
        btnEdit.style.display = 'none';
        btnDraw.textContent = '開始抽籤';
        btnCopy.style.display = 'none';
        document.body.classList.remove('is-drawn');
      }

      renderCards();
      renderKnownPlayers();
    }

    function renderCards() {
      cardsGrid.replaceChildren();
      selectedPlayers.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'player-card';
        card.style.animationDelay = (idx * 0.05) + 's';

        const res = drawResults[p];
        if (res) {
          card.classList.add('has-result');
        }

        if (!hasDrawn) {
          const removeButton = document.createElement('button');
          removeButton.className = 'btn-remove';
          removeButton.type = 'button';
          removeButton.title = '移除玩家';
          removeButton.textContent = '×';
          removeButton.addEventListener('click', () => removePlayer(p));
          card.appendChild(removeButton);
        }

        const cardHeader = document.createElement('div');
        cardHeader.className = 'card-header';
        const cardName = document.createElement('div');
        cardName.className = 'card-name';
        cardName.textContent = p;
        cardHeader.appendChild(cardName);
        card.appendChild(cardHeader);

        if (!hasDrawn) {
          card.appendChild(createPreferredRoleControl(p));
        }

        if (res) {
          const result = document.createElement('div');
          result.className = 'card-result';
          result.appendChild(createRoleColumn('main-role-col', res.main, res.secondary ? '主要' : ''));

          if (res.secondary) {
            const divider = document.createElement('div');
            divider.className = 'role-divider';
            result.appendChild(divider);
            result.appendChild(createRoleColumn('sub-role-col', res.secondary, '次要'));
          }

          card.appendChild(result);
        }

        cardsGrid.appendChild(card);
      });
    }

    function createPreferredRoleControl(playerName) {
      const control = document.createElement('label');
      control.className = 'preferred-role-control';

      const label = document.createElement('span');
      label.className = 'preferred-role-label';
      label.textContent = '指定主位';
      control.appendChild(label);

      const select = document.createElement('select');
      select.className = 'preferred-role-select';
      select.value = preferredRoles[playerName] || '';

      const emptyOption = document.createElement('option');
      emptyOption.value = '';
      emptyOption.textContent = '不指定';
      select.appendChild(emptyOption);

      positions.forEach(position => {
        const option = document.createElement('option');
        option.value = position;
        option.textContent = position;
        select.appendChild(option);
      });

      select.addEventListener('change', () => {
        if (select.value) {
          preferredRoles[playerName] = select.value;
        } else {
          delete preferredRoles[playerName];
        }
      });

      control.appendChild(select);
      return control;
    }

    function createRoleColumn(extraClass, role, label) {
      const col = document.createElement('div');
      col.className = 'role-col ' + extraClass;

      if (label) {
        const roleLabel = document.createElement('span');
        roleLabel.className = 'role-label';
        roleLabel.textContent = label;
        col.appendChild(roleLabel);
      }

      const img = document.createElement('img');
      img.src = posImgUrls[role];
      img.alt = role;
      img.className = 'role-icon-img';
      img.addEventListener('error', () => {
        img.style.display = 'none';
      }, { once: true });
      col.appendChild(img);

      const roleName = document.createElement('div');
      roleName.className = 'role-name';
      roleName.textContent = role;
      col.appendChild(roleName);

      return col;
    }

    function addPlayerName(name) {
      const val = name.trim();
      if (!val) return;
      if (selectedPlayers.includes(val)) return toast('玩家已存在');
      if (selectedPlayers.length >= 5) return toast('已達 5 人上限');

      const s = getStats();
      if (!s[val]) { s[val] = { "上路": 0, "打野": 0, "中路": 0, "下路": 0, "輔助": 0 }; saveStats(s); }

      selectedPlayers.push(val);
      inputEl.value = '';

      hasDrawn = false;
      drawResults = {};

      updateUI();
    }

    function addPlayer() {
      addPlayerName(inputEl.value);
    }

    function removePlayer(name) {
      selectedPlayers = selectedPlayers.filter(x => x !== name);
      delete preferredRoles[name];
      hasDrawn = false;
      drawResults = {};
      updateUI();
    }

    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
    btnAdd.addEventListener('click', addPlayer);

    btnEdit.addEventListener('click', () => {
      hasDrawn = false;
      drawResults = {};
      preferredRoles = {};
      updateUI();
      // focus input automatically after returning to edit mode
      setTimeout(() => inputEl.focus(), 50);
    });

    function cryptoRandom(max) {
      const array = new Uint32Array(1);
      crypto.getRandomValues(array);
      return array[0] % max;
    }

    btnDraw.addEventListener('click', () => {
      if (selectedPlayers.length === 0) return;

      // Visual effect: shrink cards briefly
      document.querySelectorAll('.player-card').forEach(el => el.classList.add('is-drawing'));

      setTimeout(() => {
        processDraw();
      }, 200);
    });

    function processDraw() {
      const names = [...selectedPlayers];

      if (names.length > positions.length) {
        toast('玩家數量超過位置數量');
        return;
      }

      const constrainedRoles = names
        .map(name => preferredRoles[name])
        .filter(Boolean);
      const duplicatedRoles = constrainedRoles.filter((role, index) => constrainedRoles.indexOf(role) !== index);
      if (duplicatedRoles.length > 0) {
        toast('指定位置重複：' + [...new Set(duplicatedRoles)].join('、'));
        updateUI();
        return;
      }

      const remainingPositions = positions.filter(position => !constrainedRoles.includes(position));
      for (let i = remainingPositions.length - 1; i > 0; i--) {
        const j = cryptoRandom(i + 1);
        const temp = remainingPositions[i];
        remainingPositions[i] = remainingPositions[j];
        remainingPositions[j] = temp;
      }

      const tempRes = [];
      let nextRandomPosition = 0;
      names.forEach(name => {
        const preferredRole = preferredRoles[name];
        const main = preferredRole || remainingPositions[nextRandomPosition++];
        tempRes.push({ name, main, secondary: '' });
      });

      // Assign secondary
      if (names.length < 5) {
        let attempts = 0;
        let assigned = false;
        while (attempts < 1000) {
          attempts++;
          tempRes.forEach(r => {
            const p = positions.filter(x => x !== r.main);
            r.secondary = p[cryptoRandom(p.length)];
          });
          const covered = new Set(tempRes.flatMap(r => [r.main, r.secondary]));
          if (covered.size >= tempRes.length + 1) {
            assigned = true;
            break;
          }
        }
        if (!assigned) {
          toast('無法生成符合條件的結果，請重試');
          updateUI();
          return;
        }
      }

      // Save to map
      drawResults = {};
      tempRes.forEach(r => { drawResults[r.name] = r; });

      // Stats update
      const s = getStats();
      tempRes.forEach(x => {
        s[x.name][x.main] += 1;
        if (x.secondary) s[x.name][x.secondary] += 0.5;
      });
      saveStats(s);
      renderStats();

      hasDrawn = true;
      updateUI();
      toast('🎲 抽籤完成！');
    }

    btnCopy.addEventListener('click', () => {
      if (!hasDrawn) return;
      let text = '';
      selectedPlayers.forEach(player => {
        if (drawResults[player]) {
          if (drawResults[player].secondary) {
            text += player + '：主要 ' + drawResults[player].main + '｜次要 ' + drawResults[player].secondary + '\n';
          } else {
            text += player + '：' + drawResults[player].main + '\n';
          }
        }
      });
      navigator.clipboard.writeText(text.trim())
        .then(() => toast('抽籤結果已複製！'))
        .catch(() => toast('無法複製到剪貼簿'));
    });

    // --- 快捷鍵設定 ---
    document.addEventListener('keydown', (e) => {
      const isInputActive = document.activeElement === inputEl;
      const isModalOpen = modal.classList.contains('open');

      if (e.key === 'Escape' && isModalOpen) {
        modal.classList.remove('open');
        return;
      }

      // Enter: 抽籤 / 重新抽籤
      if (e.key === 'Enter' && !isModalOpen) {
        // 如果輸入框內有文字且正在焦點上，讓加入玩家的事件優先處理
        if (isInputActive && inputEl.value.trim() !== '') {
          return;
        }
        e.preventDefault(); // 避免多次觸發
        if (!btnDraw.disabled) {
          btnDraw.click();
        }
      }

      // C: 複製抽籤結果 (非輸入狀態)
      if (e.key.toLowerCase() === 'c' && !isInputActive && !isModalOpen) {
        e.preventDefault();
        if (btnCopy.style.display !== 'none' && !btnCopy.disabled) {
          btnCopy.click();
        }
      }
    });

    // Stats Modal
    const modal = document.getElementById('stats-modal');
    fabStats.addEventListener('click', () => {
      renderStats();
      modal.classList.add('open');
    });
    statsClose.addEventListener('click', () => modal.classList.remove('open'));
    statsClose.addEventListener('mouseenter', () => {
      statsClose.style.color = 'white';
    });
    statsClose.addEventListener('mouseleave', () => {
      statsClose.style.color = 'var(--text-muted)';
    });
    modal.addEventListener('click', (e) => {
      if (e.target === modal) modal.classList.remove('open');
    });
    btnClearStats.addEventListener('click', () => {
      if (confirm('清空紀錄？')) {
        localStorage.removeItem(STORAGE_STATS);
        renderStats();
        renderKnownPlayers();
      }
    });

    function renderStats() {
      const stats = getStats();
      statsTbody.replaceChildren();
      sortPlayerNames(stats).forEach(n => {
        const tr = document.createElement('tr');
        const values = [n, stats[n]['上路'], stats[n]['打野'], stats[n]['中路'], stats[n]['下路'], stats[n]['輔助']];
        values.forEach(value => {
          const td = document.createElement('td');
          td.textContent = String(value);
          tr.appendChild(td);
        });
        statsTbody.appendChild(tr);
      });
    }

    // Init
    updateUI();
    renderStats();
  </script>
</body>

</html>
